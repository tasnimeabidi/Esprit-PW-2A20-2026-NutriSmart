<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriSmart  Inspiration & Santééé</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/shared-styles.css?v=3" />
  <style>
    /* -- DESIGN SYSTEM -- */
    :root {
      --bg-color: #faf9f6;
      /* Lighter cream background */
      --text-main: #223c2a;
      /* Dark green text */
      --text-muted: #6b7a6b;
      /* Muted green */
      --primary: #4a7c59;
      --accent: #f2994a;
      --border: rgba(0, 0, 0, 0.08);
      --radius-lg: 1.8rem;
      --radius-md: 1.2rem;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      min-height: 100vh;
      background-color: var(--bg-color);
      /* Uniform cream color */
      color: var(--text-main);
    }

    .dashboard-wrapper {
      margin-top: 0;
    }

    .hero-section {
      position: relative;
      height: 75vh;
      width: 100%;
      display: flex;
      align-items: center;
      padding: 0 8rem;
      overflow: hidden;
      color: white;
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 0;
      transition: transform 1.2s ease;
    }

    .hero-section::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, rgba(0, 0, 0, 0.9) 20%, rgba(0, 0, 0, 0.3) 100%);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 700px;
      animation: fadeInUp 1s ease;
    }

    .hero-title {
      font-family: "Playfair Display", serif;
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .hero-desc {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .hero-play-btn {
      background: white;
      color: black;
      border: none;
      padding: 1.2rem 4rem;
      border-radius: 4rem;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.3s;
    }

    .hero-play-btn:hover {
      transform: scale(1.05);
      background: var(--primary);
      color: white;
    }

    .main-content {
      max-width: 1400px;
      margin: -2rem auto 6rem auto;
      padding: 0 4rem;
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 3rem;
    }

    @media (max-width: 1100px) {
      .hero-section {
        padding: 0 4rem;
        height: 60vh;
      }

      .hero-title {
        font-size: 3.5rem;
      }

      .main-content {
        grid-template-columns: 1fr;
        margin-top: 2rem;
        padding: 0 2rem;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* -- LEFT COLUMN (MOVIE) -- */
    .movie-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .main-movie-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 580px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3.5rem;
      color: white;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .main-movie-card:hover {
      transform: translateY(-5px);
    }

    .main-movie-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70%;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
      z-index: 1;
    }

    .main-movie-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      transition: transform 0.8s ease;
    }

    .main-movie-card:hover .main-movie-bg {
      transform: scale(1.05);
    }

    .main-movie-content {
      position: relative;
      z-index: 2;
    }

    .main-movie-title {
      font-family: "Playfair Display", serif;
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 1rem;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .main-movie-desc {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.9);
      max-width: 80%;
      margin-bottom: 1.5rem;
    }

    /* -- RIGHT COLUMN -- */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .section-header {
      font-family: "Playfair Display", serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text-main);
    }

    .horizontal-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      justify-content: center;
    }

    .podcast-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.2rem;
      background: white;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid var(--border);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
    }

    .podcast-item:hover {
      transform: translateX(10px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
      border-color: var(--primary);
    }

    .podcast-img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
    }

    .podcast-title {
      font-weight: 700;
    }

    .podcast-author {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .podcast-play-btn {
      margin-left: auto;
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 50%;
      color: white;
      display: grid;
      place-items: center;
    }

    /* -- 3D BOOKSHELF -- */
    .bookshelf-container {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02);
    }

    .books-slider {
      display: flex;
      justify-content: center;
      gap: 5rem;
      perspective: 1500px;
      padding: 3rem 0;
      flex-wrap: nowrap;
      overflow: visible;
    }

    .book-3d {
      width: 180px;
      height: 270px;
      margin: 0 1rem;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateY(-30deg) rotateX(5deg);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: pointer;
      flex-shrink: 0;
    }

    .book-3d:hover {
      transform: rotateY(0deg) rotateX(0deg) scale(1.15) translateY(-15px);
      z-index: 10;
    }

    .book-front {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: white;
      border-radius: 2px 5px 5px 2px;
      box-shadow: 5px 10px 25px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      z-index: 2;
    }

    .book-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .book-3d::after {
      content: "";
      position: absolute;
      top: 2%;
      left: 100%;
      width: 45px;
      height: 96%;
      background: linear-gradient(to right, #e0e0e0 0%, #ffffff 20%, #f0f0f0 100%);
      transform: rotateY(90deg);
      transform-origin: left;
      border-radius: 0 3px 3px 0;
    }

    .book-spine {
      position: absolute;
      width: 45px;
      height: 100%;
      top: 0;
      left: 0;
      background: #223c2a;
      transform: rotateY(-90deg);
      transform-origin: left;
      border-radius: 4px 0 0 4px;
      z-index: 1;
    }

    /* Audio Player Sticky Bar */
    #global-audio-player {
      position: fixed;
      bottom: -100px;
      left: 0;
      width: 100%;
      background: white;
      padding: 1rem 2rem;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      border-top: 1px solid var(--border);
    }

    #global-audio-player.active {
      bottom: 0;
    }

    #player-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 300px;
    }

    #player-img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      object-fit: cover;
    }

    #player-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 0.2rem;
    }

    #player-author {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    audio {
      outline: none;
      flex-grow: 1;
      max-width: 600px;
    }

    .close-player {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--text-muted);
      cursor: pointer;
      margin-left: auto;
    }

    /* Video Modal */
    .media-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .media-modal.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .modal-content {
      width: 90%;
      max-width: 900px;
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }

    .iframe-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
    }

    .iframe-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Book Modal */
    .book-modal-content {
      width: 90%;
      max-width: 600px;
      background: white;
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 1.5rem;
      padding: 2.5rem;
      position: relative;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
    }

    .book-modal-content .book-cover {
      width: 150px;
      border-radius: 8px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .book-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }

    .book-info h4 {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 1rem;
      font-style: italic;
    }

    .book-info p {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    /* Motivation Banner */
    .motivation-banner {
      position: relative;
      max-width: 1200px;
      width: 95%;
      margin: 8rem auto 4rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 180px;
      /* Space for the doctor */
    }

    .doctor-figure {
      position: absolute;
      left: 0;
      bottom: -30px;
      width: 350px;
      height: auto;
      z-index: 10;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.4));
      pointer-events: none;
      transition: transform 0.5s ease;
    }

    .motivation-banner:hover .doctor-figure {
      transform: scale(1.05) translateY(-10px);
    }

    .advice-frame {
      background: #223c2a;
      padding: 1.2rem;
      border-radius: 3.5rem;
      width: 100%;
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.25);
      position: relative;
      border: 6px solid #1a2e21;
    }

    .frame-screen {
      background-size: cover;
      background-position: center;
      border-radius: 2.8rem;
      padding: 6rem 4rem;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: white;
    }

    .frame-screen::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.3));
      z-index: 1;
    }

    .frame-screen>* {
      position: relative;
      z-index: 2;
    }

    .motivation-label {
      font-size: 0.9rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 1.2rem;
    }

    .tip-text {
      font-family: "Playfair Display", serif;
      font-size: 2.4rem;
      font-weight: 900;
      margin-bottom: 2rem;
      max-width: 850px;
      line-height: 1.2;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .quote-text {
      font-size: 1.2rem;
      font-style: italic;
      opacity: 0.85;
      max-width: 650px;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 1000px) {
      .motivation-banner {
        padding-left: 0;
        flex-direction: column;
        margin-top: 12rem;
      }

      .doctor-figure {
        position: absolute;
        top: -180px;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
      }

      .tip-text {
        font-size: 1.8rem;
      }
    }

    /* Floating Actions Group */
    .floating-actions {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      gap: 1rem;
      z-index: 2000;
    }

    .floating-refresh,
    .floating-back {
      padding: 1rem 2rem;
      border-radius: 4rem;
      border: none;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .floating-refresh {
      background: linear-gradient(135deg, #4a7c59 0%, #8fbc8f 100%);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .floating-back {
      background: var(--primary);
      color: white;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(74, 124, 89, 0.1);
      border-left-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      padding: 4rem;
      text-align: center;
      color: #e74c3c;
      font-weight: 600;
    }

    .floating-refresh:hover,
    .floating-back:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }

    .podcast-desc-small {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      line-height: 1.4;
    }

    /* Light Book Modal */
    .book-modal-content {
      background: #fdfbf7 !important;
      color: var(--text-main) !important;
      padding: 3rem !important;
      max-width: 600px;
      width: 90%;
      border-radius: var(--radius-lg);
      position: relative;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
    }

    .modal-close-top {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(0, 0, 0, 0.05);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close-top:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: rotate(90deg);
    }

    .loading-text {
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
      padding: 5rem;
      grid-column: span 2;
    }

    @media (max-width: 900px) {
      .dashboard-container {
        grid-template-columns: 1fr;
      }

      .main-movie-card {
        min-height: 400px;
      }
    }

    /* -- SIDEBAR MENU -- */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 9998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .sidebar-menu {
      position: fixed;
      top: 0;
      left: -320px;
      width: 320px;
      height: 100vh;
      background: #f8f9fa;
      z-index: 9999;
      box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-menu.active {
      transform: translateX(320px);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem;
      border-bottom: 2px solid #eaeaea;
    }

    .sidebar-search {
      padding: 1.5rem;
      position: relative;
    }

    .sidebar-search input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.5rem;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      background: white;
    }

    .sidebar-search svg {
      position: absolute;
      left: 2.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }

    .sidebar-links {
      display: flex;
      flex-direction: column;
      padding: 0 1.5rem;
    }

    .sidebar-links a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 1.2rem 0;
      color: #4a6fa5;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      border-bottom: 1px solid #e0e0e0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .sidebar-links a:hover {
      color: var(--orange);
      padding-left: 0.5rem;
    }
  </style>
</head>

      </a>
      <a href="recette.html">
        BLOG
      </a>
      <a href="budget.html">
        COURSES ET BUDGET
      </a>

    </div>
  </div>



  <div class="dashboard-wrapper" id="dashboard-content">
    <div class="loading-text">Création de votre univers NutriSmart... ?</div>
  </div>

  <div class="floating-actions">
    <a href="nutrismart-home.html" class="floating-back">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
      <span>Retour</span>
    </a>
    <button class="floating-refresh" onclick="fetchAiPicks(true)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16" />
      </svg>
      <span>Générer</span>
    </button>
  </div>

  <div id="global-audio-player">
    <div id="player-info">
      <img src="" id="player-img" alt="cover">
      <div>
        <div id="player-title">Titre</div>
        <div id="player-author">Auteur</div>
      </div>
    </div>
    <audio id="audio-element" controls préeload="none">
      <source src="" type="audio/mpeg">
      Votre navigateur ne supporte pas l'élément audio.
    </audio>
    <button class="close-player" onclick="closeAudioPlayer()">×</button>
  </div>

  <div class="media-modal" id="mediaModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">×</button>
      <div class="iframe-container" id="iframeContainer"></div>
    </div>
  </div>

  <div class="media-modal" id="bookModal">
    <div class="book-modal-content">
      <button class="modal-close-top" onclick="closeBookModal()">×</button>
      <img src="" alt="Book Cover" class="book-cover" id="bookModalCover"
        style="width: 150px; border-radius: 8px; margin-bottom: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
      <div class="book-info">
        <h3 id="bookModalTitle" style="font-size: 1.8rem; margin-bottom: 0.5rem;">Title</h3>
        <p id="bookModalAuthor"
          style="color:var(--text-muted); font-weight: 700; margin-bottom: 1.5rem; font-size: 1.1rem;">Author</p>
        <p id="bookModalDesc" style="line-height: 1.7; margin-bottom: 2rem; font-size: 1.05rem;"></p>
        <div id="bookModalReason"
          style="padding: 1.2rem; background: rgba(0,0,0,0.03); border-radius: 12px; font-size: 0.95rem; margin-bottom: 2rem; font-weight: 600; color: var(--text-main);">
        </div>
        <div id="excerptSection"
          style="display:none; padding: 2rem; background: white; border: 1px solid var(--border); border-radius: 12px; font-style: italic; margin-bottom: 2rem; line-height: 1.8; color: var(--text-main); font-size: 1.1rem;">
        </div>
        <button onclick="toggleExcerpt(this)"
          style="width: 100%; padding: 1.2rem; border-radius: 12px; border: none; background: var(--text-main); color: white; font-weight: 700; cursor: pointer; font-size: 1.1rem; transition: transform 0.2s;">
          💡 Lire un extrait</button>
      </div>
    </div>
  </div>

  <script>
    let aiDataCache = null;
    let shownTitles = []; // Track already shown items

    function renderAiCards(data) {
      aiDataCache = data;

      // Store shown titles to prevent repetition on next generation
      if (data.movies) data.movies.forEach(m => { if (!shownTitles.includes(m.title)) shownTitles.push(m.title); });
      if (data.books) data.books.forEach(b => { if (!shownTitles.includes(b.title)) shownTitles.push(b.title); });
      if (data.podcasts) data.podcasts.forEach(p => { if (!shownTitles.includes(p.title)) shownTitles.push(p.title); });

      const contentDiv = document.getElementById('dashboard-content');
      const mainMovie = data.mainMovie || data.movies[0];

      const booksHtml = data.books.map((b, idx) => `
        <div class="book-3d" onclick="openBookModal(${idx})">
          <div class="book-spine"></div>
          <div class="book-front">
            <img src="${b.image}" alt="${b.title}" loading="lazy" onerror="this.src='https://covers.openlibrary.org/b/id/8302061-L.jpg'">
          </div>
        </div>
      `).join('');

      const podcastsHtml = data.podcasts.map((p, idx) => `
        <div class="podcast-item" onclick="playAudio(${idx})">
          <img src="${p.image}" class="podcast-img" alt="${p.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=200&auto=format&fit=crop'">
          <div class="podcast-info">
            <div class="podcast-title">${p.title}</div>
            <div class="podcast-author">${p.author}</div>
            <div class="podcast-desc-small">${p.desc || ''}</div>
          </div>
          <div class="podcast-play-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      `).join('');

      contentDiv.innerHTML = `
        <div class="hero-section">
          <div class="hero-bg" style="background-image: url('${mainMovie.image}')" onerror="this.style.backgroundImage='url(https://images.unsplash.com/photo-1490818387583-1baba5e638af?q=80&w=2000&auto=format&fit=crop)'"></div>
          <div class="hero-content">
            <div class="hero-title">${mainMovie.title}</div>
            <p class="hero-desc">${mainMovie.desc}</p>
            <div style="font-style:italic; margin-bottom: 2rem; color: rgba(255,255,255,0.7); font-size: 1.1rem;">"${mainMovie.reason}"</div>
            <button class="hero-play-btn" onclick="openMediaModal('${mainMovie.video_url}')">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              Regarder le film
            </button>
          </div>
        </div>

        <div class="main-content">
          <div class="left-col">
            <div class="list-container bookshelf-container">
              <h2 class="section-header" style="margin-bottom: 0.5rem;">Livres Recommandés</h2>
              <p style="color:var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Sélectionnés pour votre profil NutriSmart.</p>
              <div class="books-slider" style="padding-top: 0;">${booksHtml}</div>
            </div>

          </div>

          <div class="right-col">
            <div class="list-container bookshelf-container">
              <h2 class="section-header">Podcasts Santé</h2>
              <div class="horizontal-list">${podcastsHtml}</div>
            </div>
          </div>
        </div>

        <div class="motivation-banner">
          <img src="../../image/nutrisionist.png" class="doctor-figure" alt="Nutritionist">
          <div class="advice-frame">
            <div class="frame-screen" style="background-image: url('../../image/nutr.jpg')">
              <div class="motivation-label">Conseil de votre Nutritionniste</div>
              <div class="tip-text">"${data.dailyTip}"</div>
              
              <div class="motivation-label" style="color: white; opacity: 0.6; font-size: 0.8rem;">Note Inspirante</div>
              <div class="quote-text">"${data.motivation.quote}"</div>
              <div style="font-weight:700; opacity:0.7; font-size:0.9rem;"> ${data.motivation.author}</div>
            </div>
          </div>
        </div>
      `;
    }

    function fetchAiPicks(forceRefresh = false) {
      const contentDiv = document.getElementById('dashboard-content');

      // REAL-TIME LOADING STATE
      if (forceRefresh) {
        contentDiv.innerHTML = `
          <div style="height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem;">
            <div class="loading-spinner"></div>
            <div style="font-family: 'Playfair Display'; font-size: 1.8rem; color: var(--primary); letter-spacing: 1px;">
              L'IA NutriSmart analyse votre profil...
            </div>
            <p style="color: var(--text-muted); opacity: 0.7;">Génération de recommandations personnalisées en temps réel</p>
          </div>
        `;
      }

      let formData = new FormData();
      formData.append('forceRefresh', forceRefresh ? 'true' : 'false');
      formData.append('shownTitles', JSON.stringify(shownTitles));

      fetch('api.php?action=get_ai_picks', {
        method: 'POST',
        body: formData
      })
        .then(res => res.json())
        .then(res => {
          if (res.success) {
            renderAiCards(res.data);
            // Scroll to top if forced
            if (forceRefresh) window.scrollTo({ top: 0, behavior: 'smooth' });
          } else {
            contentDiv.innerHTML = `<div class="error-msg" style="text-align:center; padding: 5rem; color:red;">Désolé, l'IA est momentanément indisponible.</div>`;
          }
        })
        .catch(err => {
          console.error(err);
          contentDiv.innerHTML = `<div class="error-msg" style="text-align:center; padding: 5rem; color:red;">Une erreçur de connexion est survenue.</div>`;
        });
    }

    const audioBar = document.getElementById('global-audio-player');
    const audioElement = document.getElementById('audio-element');

    function playAudio(index) {
      if (!aiDataCache) return;
      const podcast = aiDataCache.podcasts[index];
      if (!podcast) return;

      document.getElementById('player-img').src = podcast.image;
      document.getElementById('player-title').textContent = podcast.title;
      document.getElementById('player-author').textContent = podcast.author;
      audioElement.src = podcast.audio_url;
      audioElement.load();
      audioElement.play();
      audioBar.classList.add('active');
    }

    function closeAudioPlayer() {
      audioElement.pause();
      audioBar.classList.remove('active');
    }

    const mediaModal = document.getElementById('mediaModal');
    const iframeContainer = document.getElementById('iframeContainer');
    function openMediaModal(url) {
      if (!url) return;
      iframeContainer.innerHTML = `<iframe src="${url}" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe>`;
      mediaModal.classList.add('active');
    }
    document.getElementById('closeModal').addEventListener('click', () => {
      mediaModal.classList.remove('active');
      iframeContainer.innerHTML = '';
    });

    const bookModal = document.getElementById('bookModal');
    function openBookModal(index) {
      if (!aiDataCache || !aiDataCache.books[index]) return;
      const book = aiDataCache.books[index];

      document.getElementById('bookModalCover').src = book.image;
      document.getElementById('bookModalTitle').textContent = book.title;
      document.getElementById('bookModalAuthor').textContent = book.author;
      document.getElementById('bookModalDesc').textContent = book.desc || '';
      document.getElementById('bookModalReason').textContent = '📖' + (book.reason || '');
      const excerptSection = document.getElementById('excerptSection');
      if (excerptSection) {
        excerptSection.textContent = book.excerpt || book.desc || '';
        excerptSection.style.display = 'none';
      }
      bookModal.classList.add('active');
    }

    function toggleExcerpt(btn) {
      const excerptSection = document.getElementById('excerptSection');
      if (!excerptSection) return;
      const isHidden = excerptSection.style.display === 'none';
      excerptSection.style.display = isHidden ? 'block' : 'none';
      btn.textContent = isHidden ? '💡 Masquer l\'extrait' : '💡 Lire un extrait';
    }

    function closeBookModal() {
      const bookModal = document.getElementById('bookModal');
      bookModal.classList.remove('active');
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchAiPicks(false);
    });

    // --- SIDEBAR MENU LOGIC ---
    function openSidebar() {
      document.getElementById('sidebarMenu').classList.add('active');
      document.getElementById('sidebarOverlay').classList.add('active');
      document.body.style.overflow = 'hidden'; // Prevent scrolling
    }

    function closeSidebar() {
      document.getElementById('sidebarMenu').classList.remove('active');
      document.getElementById('sidebarOverlay').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // --- SEARCH LOGIC ---
    function performSiteSearch(query) {
      if (!query || query.trim() === '') return;
      query = query.toLowerCase().trim();

      closeSidebar();

      const searchableElements = document.querySelectorAll('.feat-card, .plate-item, .how-step, h1, h2, h3, h4');
      let found = false;

      for (const el of searchableElements) {
        if (el.innerText.toLowerCase().includes(query)) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });

          const originalOutline = el.style.outline;
          const originalOutlineOffset = el.style.outlineOffset;
          el.style.outline = '4px solid var(--orange)';
          el.style.outlineOffset = '4px';

          setTimeout(() => {
            el.style.outline = originalOutline;
            el.style.outlineOffset = originalOutlineOffset;
          }, 2000);

          found = true;
          break;
        }
      }

      if (!found) {
        alert('Aucun résultat trouvé pour : ' + query);
      }
      document.getElementById('siteSearch').value = '';
    }

  </script>
  <script src="js/page-transitions.js"></script>

</body>

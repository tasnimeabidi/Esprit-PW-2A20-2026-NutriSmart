<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau Mot de Passe — NutriSmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared-styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .reset-container {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
        }
        .reset-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            color: #223c2a;
            font-weight: 800;
            font-size: 1.5rem;
            text-decoration: none;
        }
        /* --- PW Toggle Styles --- */
        .pw-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .pw-wrapper input {
            padding-right: 3rem !important;
        }
        .toggle-pw {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.2s;
        }
        .toggle-pw:hover {
            color: #4a7c59;
        }
    </style>
</head>
<body>
    <div class="reset-container glass-card">
        <a href="nutrismart-website.html" class="reset-logo">
            <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 20 80 C 35 45 65 25 90 10 C 90 60 70 90 20 80 Z" fill="#4a7c59"/>
                <path d="M 20 80 C 10 30 40 10 90 10 C 65 25 35 45 20 80 Z" fill="#8fbc8f"/>
            </svg>
            NutriSmart
        </a>

        <h1 style="font-family:'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 1rem; color: #1a2f21;">Nouveau mot de passe</h1>
        <p style="color: #64748b; margin-bottom: 2.5rem; line-height: 1.6;">Veuillez choisir un mot de passe robuste (min. 8 caractères) pour protéger votre compte.</p>

        <form id="newPasswordForm" method="POST" action="api.php?action=update_password">
            <input type="hidden" id="reset_token" name="token">
            
            <div id="update-error" style="display:none; background:rgba(229,57,53,0.1); color:#e53935; padding:1rem; border-radius:12px; margin-bottom:1.5rem; font-size:0.9rem; text-align: left; font-weight: 600;"></div>

            <div class="form-group" style="text-align:left; margin-bottom:1.5rem;">
                <label style="display:block; margin-bottom:0.6rem; font-weight:600; color: #334155;">Nouveau mot de passe</label>
                <div class="pw-wrapper">
                    <input type="password" id="password" name="new_password" placeholder="••••••••" required style="width:100%; padding:1rem; border-radius:12px; border:1px solid #e2e8f0;" />
                    <button type="button" class="toggle-pw" onclick="togglePW('password')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-group" style="text-align:left; margin-bottom:2rem;">
                <label style="display:block; margin-bottom:0.6rem; font-weight:600; color: #334155;">Confirmer le mot de passe</label>
                <div class="pw-wrapper">
                  <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required style="width:100%; padding:1rem; border-radius:12px; border:1px solid #e2e8f0;" />
                  <button type="button" class="toggle-pw" onclick="togglePW('confirm_password')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width:100%; padding:1.2rem; border-radius:14px; font-size:1.1rem; font-weight:700;">Mettre à jour &rarr;</button>
        </form>

        <div id="reset-success" style="display:none;">
            <div style="font-size:4rem; color:#4a7c59; margin-bottom:1.5rem;">✨</div>
            <h2 style="font-family:'Playfair Display', serif; color:#1a2f21; margin-bottom:1rem;">Mot de passe changé !</h2>
            <p style="color:#64748b; margin-bottom:2rem;">Votre accès a été sécurisé avec succès. Vous pouvez maintenant vous connecter.</p>
            <a href="login.html" class="btn-primary" style="display:block; text-decoration:none; padding:1.2rem; border-radius:14px; font-weight:700;">Se connecter</a>
        </div>
    </div>

    <script>
        function togglePW(id) {
          const input = document.getElementById(id);
          const btn = input.nextElementSibling;
          if (input.type === 'password') {
            input.type = 'text';
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
          } else {
            input.type = 'password';
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
          }
        }

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const form = document.getElementById('newPasswordForm');

        if (!token) {
            form.innerHTML = `
              <div style="background:rgba(229,57,53,0.1); color:#e53935; padding:1.5rem; border-radius:12px; text-align:center;">
                  <strong style="display:block; margin-bottom:0.5rem;">Lien Invalide ou Expiré</strong>
                  <p style="font-size:0.85rem; margin-bottom:1rem;">Ce lien de récupération est incomplet ou n'est plus valable. Veuillez refaire une demande.</p>
                  <a href="login.html" style="color:#e53935; font-weight:700; text-decoration:underline;">Retour à la connexion</a>
              </div>`;
        } else {
            document.getElementById('reset_token').value = token;
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('update-error');

            if (pass.length < 8) {
                errorDiv.textContent = "Le mot de passe doit contenir au moins 8 caractères.";
                errorDiv.style.display = 'block';
                return;
            }

            if (pass !== confirm) {
                errorDiv.textContent = "Les mots de passe ne correspondent pas.";
                errorDiv.style.display = 'block';
                return;
            }

            const formData = new FormData(this);
            fetch('api.php?action=update_password', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    form.style.display = 'none';
                    document.querySelector('h1').style.display = 'none';
                    document.querySelector('p').style.display = 'none';
                    document.getElementById('reset-success').style.display = 'block';
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            })
            .catch(() => {
                errorDiv.textContent = "Erreur de connexion au serveur.";
                errorDiv.style.display = 'block';
            });
        });
    </script>
</body>
</html>
